version: '3.8'

services:
  db-server:
    build: .
    container_name: dbnexus-server
    ports:
      - "8080:8080"
    volumes:
      - dbnexus-data:/data
      - ./frontend/dist:/app/frontend/dist:ro
    environment:
      - dbnexus_DATA_DIR=/data
      - dbnexus_LANG=zh
    restart: unless-stopped

  # Optional: PostgreSQL for testing
  postgres:
    image: postgres:16-alpine
    container_name: dbnexus-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test123
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Optional: MySQL for testing
  mysql:
    image: mysql:8.0
    container_name: dbnexus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: testdb
      MYSQL_USER: test
      MYSQL_PASSWORD: test123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  # Optional: Redis for testing
  redis:
    image: redis:7-alpine
    container_name: dbnexus-redis
    ports:
      - "6380:6379"
    restart: unless-stopped

volumes:
  dbnexus-data:
  pg-data:
  mysql-data:
