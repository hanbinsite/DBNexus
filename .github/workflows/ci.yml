name: CI/CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Test & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        run: go test ./... -count=1 -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        run: go build -o db-server .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: db-server-binary
          path: db-server

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t db-client:latest .

      - name: Run Docker container test
        run: |
          docker run -d --name db-client-test db-client:latest
          sleep 5
          docker logs db-client-test
          docker stop db-client-test
          docker rm db-client-test
