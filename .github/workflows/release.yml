name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 0.0.1)'
        required: true
        default: '0.0.1'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            ext: .exe
            asset_name: DBNexus-windows-amd64
          - os: macos-latest
            ext: ''
            asset_name: DBNexus-darwin-amd64
          - os: ubuntu-latest
            ext: ''
            asset_name: DBNexus-linux-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libgcc1

      - name: Build
        run: wails build -clean
        env:
          CGO_ENABLED: 1

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd build/bin
          Compress-Archive -Path *.exe -DestinationPath ../${{ matrix.asset_name }}.zip

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd build/bin
          tar -czf ../${{ matrix.asset_name }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            build/*.zip
            build/*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DBNexus ${{ github.ref_name }}
          body: |
            ## DBNexus ${{ github.ref_name }}

            ### Downloads
            - Windows: `DBNexus-windows-amd64.zip`
            - macOS: `DBNexus-darwin-amd64.tar.gz`
            - Linux: `DBNexus-linux-amd64.tar.gz`

            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          draft: false
          prerelease: false
