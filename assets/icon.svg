<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  
  <!-- Database cylinder -->
  <g transform="translate(128, 110)">
    <!-- Top ellipse -->
    <ellipse cx="0" cy="-40" rx="60" ry="18" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <!-- Side lines -->
    <path d="M -60,-40 L -60,40 Q -60,58 0,58 Q 60,58 60,40 L 60,-40" fill="none" stroke="url(#accent)" stroke-width="6"/>
    <!-- Middle ellipse (data layer) -->
    <ellipse cx="0" cy="0" rx="60" ry="18" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.5"/>
    <ellipse cx="0" cy="20" rx="60" ry="18" fill="none" stroke="#6366f1" stroke-width="3" opacity="0.3"/>
  </g>
  
  <!-- Nexus connection nodes -->
  <g transform="translate(128, 110)">
    <!-- Connection lines -->
    <line x1="0" y1="-40" x2="-80" y2="-70" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6"/>
    <line x1="0" y1="-40" x2="80" y2="-70" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6"/>
    <line x1="0" y1="-40" x2="0" y2="-90" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6"/>
    <line x1="0" y1="58" x2="-70" y2="90" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6"/>
    <line x1="0" y1="58" x2="70" y2="90" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6"/>
    
    <!-- Nodes -->
    <circle cx="-80" cy="-70" r="6" fill="#6366f1"/>
    <circle cx="80" cy="-70" r="6" fill="#6366f1"/>
    <circle cx="0" cy="-90" r="6" fill="#8b5cf6"/>
    <circle cx="-70" cy="90" r="6" fill="#6366f1"/>
    <circle cx="70" cy="90" r="6" fill="#6366f1"/>
  </g>
  
  <!-- Text -->
  <text x="128" y="225" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" fill="#e6edf3" text-anchor="middle" letter-spacing="2">DBNexus</text>
</svg>
